name: CI

on:
  push:
    branches: [main]
  pull_request:

# No deployment secrets are used or required by this workflow.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.21.1

jobs:
  verify:
    name: Lint, format, typecheck, unit, boundaries, links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Formatting check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Localization parity
        run: pnpm --filter @lazy-patta/localization test

      - name: Design-token validation
        run: pnpm --filter @lazy-patta/design-tokens test

      - name: Engine dependency-boundary
        run: pnpm --filter @lazy-patta/game-engine test

      - name: Check documentation links
        run: pnpm check-links

  build-web:
    name: Next.js production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build

  e2e:
    name: Playwright E2E (computer game)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build web
        run: pnpm --filter web build

      - name: Run E2E
        run: pnpm --filter web test:e2e

  mobile:
    name: Expo Doctor + Android/iOS export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Expo Doctor
        working-directory: apps/mobile
        run: npx expo-doctor

      - name: Expo export (Android)
        working-directory: apps/mobile
        run: npx expo export --platform android --output-dir dist-android

      - name: Expo export (iOS)
        working-directory: apps/mobile
        run: npx expo export --platform ios --output-dir dist-ios

  security:
    name: Secret scan + dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action to scan pull_request events.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (production, high severity)
        run: pnpm audit --prod --audit-level=high

  rls-integration:
    name: Supabase RLS behavioural tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase stack
        run: pnpm supabase:start

      - name: Behavioural RLS tests (live)
        run: pnpm test:rls

      - name: Stop local Supabase stack
        if: always()
        run: pnpm supabase:stop
