# Local Supabase stack config for behavioural RLS tests (`pnpm supabase:start`).
# Only the sections needed to run Auth + Postgres with our migrations are set;
# the CLI fills the rest with defaults.

project_id = "lazy-patta"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Tests provision users via the service role with email_confirm=true, so no live
# email delivery is required. Signups stay enabled so provisioning works.
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = false

[analytics]
enabled = false
